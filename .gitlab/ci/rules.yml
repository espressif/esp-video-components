##############
# if anchors #
##############
.if-protected: &if-protected
  if: '($CI_COMMIT_REF_NAME == "master" || $CI_COMMIT_BRANCH =~ /^release\/v/ || $CI_COMMIT_TAG =~ /^v\d+\.\d+(\.\d+)?($|-)/)'

.if-dev-push: &if-dev-push
  if: '$CI_COMMIT_REF_NAME != "master" && $CI_COMMIT_BRANCH !~ /^release\/v/ && $CI_COMMIT_TAG !~ /^v\d+\.\d+(\.\d+)?($|-)/ && ($CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event")'

.if-idf-latest: &if-idf-latest
  if: '$CI_BUILD_IDF_LATEST == "enable"'

.if-protected-or-web-trigger: &if-protected-or-web-trigger
  if: '($CI_COMMIT_REF_NAME == "master" || $CI_COMMIT_BRANCH =~ /^release\/v/ || $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(\.\d+)?($|-)/ || $CI_PIPELINE_SOURCE == "web")'

##################
# Auto Generated #
##################
.if_label-deploy: &if-label-deploy
  if: '$CI_MERGE_REQUEST_LABELS =~ /^(?:[^,\n\r]+,)*deploy(?:,[^,\n\r]+)*$/i'

############
# Patterns #
############
.patterns-docs: &patterns-docs
  - "docs/**/*"
  - ".gitlab/ci/build_docs.yml"
  - ".gitlab/ci/deploy.yml"
  - ".gitlab/ci/post_deploy.yml"

.patterns-c-files: &patterns-c-files
  - "**/*.{c,C,cpp}"
  - "**/*.{h,H,hpp}"
  - "**/Kconfig"
  - "**/Kconfig.*"
  - "**/CMakeLists.txt"
  - "**/sdkconfig.rename"
  - "**/sdkconfig.ci.*"
  - "**/sdkconfig.ci.*.*"
  - "esp_cam_sensor/sensors/**/*.json"
  - "esp_ipa/tools/config/*.py"
  - "**/idf_component.yml"
  - "**/*.cmake"
  - ".gitlab/ci/build.yml"
  - ".gitlab/ci/deploy.yml"
  - ".gitlab/ci/post_deploy.yml"
  - ".gitlab/ci/rules.yml"

# rules for examples
.rules:build:examples:
  rules:
    - <<: *if-protected
    - <<: *if-dev-push
      changes: *patterns-c-files

.rules:build:test_apps:
  rules:
    - <<: *if-protected
    - <<: *if-dev-push
      changes: *patterns-c-files

# For others
.rules:build:build_doc:
  rules:
    - <<: *if-protected
    - <<: *if-dev-push
      changes: *patterns-docs
      
.rules:deploy:docs_preview:
  rules:
    - <<: *if-dev-push
      changes: *patterns-docs

.rules:deploy:docs_production:
  rules:
    - <<: *if-protected

.rules:build:idf_latest:
  rules:
    - <<: *if-idf-latest